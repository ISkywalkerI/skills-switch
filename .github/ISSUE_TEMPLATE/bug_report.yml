name: Bug report
description: Report a reproducible problem in Skills Switch
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: The app blocks migration when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps
      placeholder: |
        1. Open the app
        2. Click Rescan
        3. Open Migration Assistant
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11
  - type: input
    id: version
    attributes:
      label: App version or commit
      placeholder: v0.1.1 or commit SHA
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Paste logs or drag screenshots here if available
